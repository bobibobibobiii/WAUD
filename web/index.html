<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="一个极简主义的时间记录 App（网页版/PWA）。">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="在干啥WAUD">
  <link rel="apple-touch-icon" href="assets/assets/app_icon.jpg">

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="assets/assets/app_icon.jpg"/>

  <title>在干啥WAUD</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body { height: 100%; }
    body { margin: 0; }
    #waud-splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      #waud-splash { background: #000000; }
    }
    #waud-splash img {
      width: 160px;
      height: 160px;
      object-fit: contain;
      border-radius: 24px;
    }
  </style>
</head>
<body>
  <div id="waud-splash">
    <img src="assets/assets/app_icon.jpg" alt="在干啥WAUD" />
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('waud-splash');
      if (el) el.remove();
    });
  </script>
</body>
</html>
